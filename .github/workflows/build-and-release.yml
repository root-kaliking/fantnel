name: Build and Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build Frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Publish Backend
        run: |
          dotnet publish Fantnel/Fantnel.csproj -c Release -o publish/backend

      - name: Combine Artifacts
        run: |
          mkdir -p publish/release
          cp -r publish/backend/* publish/release/
          cp -r web/dist publish/release/wwwroot

      - name: Package Release
        run: |
          cd publish/release
          zip -r ../../release.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: release.zip
          body: "自动构建版本，基于提交 ${{ github.sha }}"
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}